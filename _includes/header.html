<header class="site-header h-card">
    <div class="site-title-row">
        {% include gravatar.html size="96" class="header-avatar u-photo" %}
        <div>
            <a href="{{ '/' | relative_url }}" class="site-title p-name u-url" rel="me">Alevtina Verbovetskaya</a>
            <div class="site-subtitle p-note">librarian · knitter · vegan</div>
        </div>
    </div>
    <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
        <span class="nav-sep">·</span>
        <a href="{{ '/about' | relative_url }}"{% if page.url == '/about' or page.url == '/about/' %} class="active"{% endif %}>About</a>
        <span class="nav-sep">·</span>
        <a href="{{ '/reading' | relative_url }}"{% if page.url == '/reading' or page.url == '/reading/' or page.layout == 'read' %} class="active"{% endif %}>Reading</a>
        <span class="nav-sep">·</span>
        <a href="{{ '/knitting' | relative_url }}"{% if page.url == '/knitting' or page.url == '/knitting/' or page.layout == 'knit' %} class="active"{% endif %}>Knitting</a>
        <span class="nav-sep">·</span>
        <a href="{{ '/blog' | relative_url }}"{% if page.url == '/blog' or page.url == '/blog/' or page.layout == 'post' %} class="active"{% endif %}>Blog</a>
        <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
            <span class="toggle-label">🌞</span>
            <span class="toggle-track"><span class="toggle-knob"></span></span>
            <span class="toggle-label">🌚</span>
        </button>
    </nav>
</header>
