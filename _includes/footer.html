<footer class="site-footer">
    <div>&copy; {{ 'now' | date: "%Y" }} <a href="mailto:{{ site.social.email }}">{{ site.author.name }}</a>.</div>
    <div class="footer-links">
        <a href="{{ site.social.linkedin }}" rel="noopener noreferrer" aria-label="LinkedIn"><svg width="16" height="16" viewBox="0 0 16 16"><use href="{{ '/assets/minima-social-icons.svg#linkedin' | relative_url }}"></use></svg></a>
        <a href="https://github.com/{{ site.social.github }}" rel="me noopener noreferrer" aria-label="GitHub"><svg width="16" height="16" viewBox="0 0 16 16"><use href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"></use></svg></a>
        <a href="{{ site.social.mastodon }}" rel="me noopener noreferrer" aria-label="Mastodon"><svg width="16" height="16" viewBox="0 0 16 16"><use href="{{ '/assets/minima-social-icons.svg#mastodon' | relative_url }}"></use></svg></a>
        <a href="{{ '/feed.xml' | relative_url }}" aria-label="RSS"><svg width="16" height="16" viewBox="0 0 16 16"><use href="{{ '/assets/minima-social-icons.svg#rss' | relative_url }}"></use></svg></a>
        <div class="theme-toggle" role="group" aria-label="Color theme">
            <button class="theme-btn" data-theme="light" aria-label="Light">☀</button>
            <button class="theme-btn" data-theme="system" aria-label="System default">◑</button>
            <button class="theme-btn" data-theme="dark" aria-label="Dark">☾</button>
        </div>
    </div>
</footer>
