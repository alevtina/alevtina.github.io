# Site settings
title: "Alevtina Verbovetskaya"
email: alevtina.verbovetskaya@cuny.edu
description: >-
  University Director of Library Systems at The City University of New York.
  Leading the systems team behind CUNY's 31 academic libraries.
baseurl: ""
url: "https://verbovetskaya.com"

# Personal information
author:
  name: "Alevtina Verbovetskaya"
  title: "University Director of Library Systems"
  organization: "The City University of New York"
  bio: >-
    I lead a small team of systems librarians responsible for the technology
    that runs across CUNY's 31 academic libraries.
  gravatar_hash: "4c8b7c933d28e9911ff6d9e2a4d0fe5d"  # MD5 of alevtina.verbovetskaya@cuny.edu

# Social profiles
social:
  linkedin: https://www.linkedin.com/in/alevtina-verbovetskaya/
  github: alevtina
  email: alevtina.verbovetskaya@cuny.edu
  mastodon: https://glammr.us/@alevtina

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
excerpt_separator: "<!--more-->"
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jekyll-webmention_io
  - jekyll-archives

# Tag archives
jekyll-archives:
  enabled:
    - tags
  layout: tag_archive
  permalinks:
    tag: /tags/:name/

# Webmentions
webmentions:
  username: verbovetskaya.com
  cache_folder: _data
  pages: false
  js: false
  templates:
    webmentions: _includes/webmentions/webmentions.html
    likes: _includes/webmentions/likes.html
    reposts: _includes/webmentions/reposts.html
    replies: _includes/webmentions/replies.html


# Reading collection
collections:
  reading:
    output: true
    permalink: /reading/:name/

# jekyll-feed: main feed + reading feed
feed:
  collections:
    posts:
      path: "/feed.xml"
    reading:
      path: "/feed/reading.xml"

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /blog/:title/
  - scope:
      path: ""
      type: "reading"
    values:
      layout: "read"

